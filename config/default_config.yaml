# Claude Bugfix Default Configuration

# LLM Configuration
llm:
  model: "gpt-4"
  temperature: 0.1
  max_tokens: 4096
  api_timeout: 60

# Agent Configuration
agent:
  max_iterations: 100
  max_tool_calls_per_iteration: 5
  enable_verbose_logging: false

# File Operation Limits
file_operations:
  max_file_size_mb: 10
  excluded_directories:
    - node_modules
    - .git
    - __pycache__
    - .venv
    - venv
    - dist
    - build
    - .next
    - .nuxt
    - target
    - vendor
  excluded_patterns:
    - "*.pyc"
    - "*.pyo"
    - "*.so"
    - "*.dylib"
    - "*.dll"
    - "*.exe"
    - "*.bin"
    - "*.log"
    - ".DS_Store"
  search_max_results: 100

# Bash Command Configuration
bash:
  # Default timeout for bash commands (seconds)
  timeout: 60
  # List of blocked dangerous commands (optional)
  # blocked_commands:
  #   - "rm -rf /"
  #   - "format"
  # List of allowed commands only (whitelist mode, optional)
  # allowed_commands:
  #   - "ls"
  #   - "cat"
  #   - "echo"

# Diff Display
diff:
  context_lines: 3
  syntax_highlighting: true
